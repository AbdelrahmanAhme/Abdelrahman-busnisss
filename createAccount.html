        <h2>create account</h2>
        <br/>
        <h2>username</h3>
        <input id="username" class="search-bar" type="text" placeholder="username">
        <br/>
        <h3>password</h3>
        <input class="search-bar"  id="password" type="password" placeholder="password" class="input-field">
        <br/><br/>
        <button onclick="createAccount()"class=btn2 ">create</button>
        <br/>

    <br/><br/> <br/><br/>

       <script>
 let users = JSON.parse(localStorage.getItem("users")) || [];
let passwords = JSON.parse(localStorage.getItem("passwords")) || [];

function createAccount() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (users.indexOf(username) !== -1) {
        alert("Username already exists");
        return;
    }

    users.push(username);
    passwords.push(password);

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("passwords", JSON.stringify(passwords));

    alert("Account Created Successfully!");
    window.location.href = "index.html";
    
}
</script>
