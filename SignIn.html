    <div class="sign-in box search-bar2"style="color:white">
        <h2>sign in</h2>

        <h2>username</h3>
        <input id="username" class="search-bar" type="text" placeholder="username">
        <br/>
        <h3>password</h3>
        <input class="search-bar" type="password" placeholder="password" class="input-field">
        <br/><br/>
        <button onclick="login()"class=btn2 ">log in</button>
        <br/>
    </div>
    <br/><br/> <br/><br/>

       <script>
 function login() {

    let username = document.getElementById("username").value;
    let password = document.querySelector('input[type="password"]').value;

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let passwords = JSON.parse(localStorage.getItem("passwords")) || [];

    let index = users.indexOf(username);

    if (index !== -1 && passwords[index] === password) {

        localStorage.setItem("userName", username);

        alert("Login successful!");

        window.location.href = "home.html";

    } else {

        alert("Invalid username or password. Please try again.");

    }
}
</script>
